<template>
    <lightning-card title="Opportunity Dashboard">
        <div class="slds-m-around_medium">

            <lightning-combobox
                label="Chart Type"
                value={chartType}
                options={options}
                onchange={handleChange}>
            </lightning-combobox>

            <div style="height:400px;" class="slds-m-top_medium">
                <canvas class="chart"></canvas>
            </div>

        </div>
    </lightning-card>
</template>
