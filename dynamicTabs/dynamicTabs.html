<template>
    <lightning-card title="Opportunities">

        <!-- Tabs -->
        <div class="tabs">
            <template for:each={tabs} for:item="tab">
                <button key={tab} class={tabClass} data-value={tab} onclick={handleTabClick}>
                    {tab}
                </button>
            </template>
        </div>

        <!-- Actions -->
        <div class="actions">
            <lightning-button label="Refresh" onclick={refresh}></lightning-button>
            <lightning-button label="Add" onclick={openModal}></lightning-button>
        </div>

        <!-- Table -->
        <lightning-datatable key-field="Id" data={data} columns={columns} draft-values={draftValues} onsave={handleSave}
            onsort={handleSort} sorted-by={sortedBy} sorted-direction={sortedDirection} hide-checkbox-column>
        </lightning-datatable>

        <!-- Modal -->
        <template if:true={showModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!-- HEADER -->
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">New Opportunity</h2>
                    </header>

                    <!-- BODY -->
                    <div class="slds-modal__content slds-p-around_medium">

                        <lightning-record-edit-form object-api-name="Opportunity" onsubmit={handleSubmit}
                            onsuccess={handleSuccess} onerror={handleError}>

                            <lightning-input-field field-name="Name"></lightning-input-field>

                            <!-- Keep field static -->
                            <lightning-input-field field-name={fieldApiName}></lightning-input-field>

                            <lightning-input-field field-name="Amount"></lightning-input-field>
                            <lightning-input-field field-name="CloseDate"></lightning-input-field>

                            <div class="slds-modal__footer">
                                <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                                <lightning-button type="submit" variant="brand" label="Save"></lightning-button>
                            </div>

                        </lightning-record-edit-form>

                    </div>
                </div>
            </section>

            <!-- BACKDROP -->
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
