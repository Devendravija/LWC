<template>
    <div class="slds-box">
        <div class="slds-grid slds-wrap">
            <div class="slds-col slds-size_3-of-12 slds-p-around_medium">
                <lightning-combobox name="progress" label="Category" value={valueCategory} placeholder="Select Progress"
                    options={optionsCategory} onchange={handleChange}>
                </lightning-combobox>
            </div>
            
            <div class="slds-col slds-size_3-of-12 slds-p-around_medium">
                <lightning-combobox name="progress" label="Sort by Price" value={valuePrice}
                    placeholder="Select Progress" options={optionsPrice} onchange={handleChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_3-of-12 slds-p-around_medium">
                <lightning-combobox name="progress" label="Sort by Rating" value={valueRating}
                    placeholder="Select Progress" options={optionsRating} onchange={handleChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_3-of-12 slds-p-around_medium">
                <br>
                <lightning-button label="Apply Filters" title="Non-primary action" onclick={handleClick}
                    class="slds-m-left_x-small"></lightning-button>
            </div>

        </div>
        <div class="explore-products">Explore Products</div>

        
    </div>

   <div class="slds-grid slds-wrap">
        <template for:each={filteredProducts} for:item="product">   
            <div class="slds-col slds-size_3-of-12 slds-p-around_medium" key={product.id}>
                <div class="slds-box slds-theme_default">
                    <div class="slds-text-heading_medium">{product.name}</div>
                    <div class="slds-text-heading_medium">{product.categoryName}</div>
                    <div class="slds-text-heading_medium">{product.id}</div>
                    <div class="slds-text-heading_medium">
                        <img src={product.image} alt={product.name} style="max-width: 100%; height: auto;">
                    </div>
                    <div class="slds-text-body_regular">Price: ${product.price}</div>
                    <div class="slds-text-body_regular">Rating: {product.rating} stars</div>
                    <div class="slds-text-body_regular">Stock Status: {product.stockStatus}</div>
                    <div class="slds-text-body_regular">Description: {product.description}</div>
                    <div class="slds-text-body_regular">Reviews:</div>
                </div>
            </div>
            </template>
            </div>

</template>
