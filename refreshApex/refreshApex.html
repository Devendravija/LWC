<template>
    <lightning-card title="Opportunity Management">

        <!-- Buttons -->
        <div class="slds-m-bottom_small">
            <lightning-button label="Refresh" onclick={handleRefresh}></lightning-button>
            <lightning-button label="New Opportunity" onclick={openCreateModal} class="slds-m-left_small"></lightning-button>
        </div>

        <!-- Datatable -->
        <lightning-datatable
            key-field="Id"
            data={data}
            columns={columns}
            onrowaction={handleRowAction}
            draft-values={draftValues}
            onsave={handleSave}
            >
        </lightning-datatable>

    </lightning-card>

    <!-- 🔷 COMMON MODAL (CREATE / VIEW / EDIT) -->
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">{modalTitle}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-record-form
                        object-api-name="Opportunity"
                        record-id={recordId}
                        layout-type="Full"
                        mode={mode}
                        onsuccess={handleSuccess}>
                    </lightning-record-form>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeModal}></lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 🔷 DELETE CONFIRMATION MODAL -->
    <template if:true={isDeleteModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Confirm Delete</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    Are you sure you want to delete this Opportunity?
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeDeleteModal}></lightning-button>
                    <lightning-button label="Delete" variant="destructive" onclick={confirmDelete}></lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
